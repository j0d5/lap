name: PR Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: pr-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install system dependencies
        run: brew install nasm pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-aarch64-cargo-

      - name: Patch ffmpeg-sys-next (macOS arm64 compatibility)
        shell: bash
        run: |
          set -euo pipefail

          cargo fetch --manifest-path src-tauri/Cargo.toml

          BUILD_RS=$(find ~/.cargo/registry/src -type f -path "*/ffmpeg-sys-next-8.0.1/build.rs" | head -n 1)
          if [ -z "${BUILD_RS}" ]; then
            echo "Could not find ffmpeg-sys-next build.rs"
            exit 1
          fi

          perl -0777 -i -pe 's@configure\.arg\("--extra-cflags=-march=native -mtune=native"\);\n@if matches!(env::var("CARGO_CFG_TARGET_OS").as_deref(), Ok("macos"))\n            && matches!(env::var("CARGO_CFG_TARGET_ARCH").as_deref(), Ok("aarch64")) {\n            configure.arg("--disable-asm");\n        } else {\n            configure.arg("--extra-cflags=-march=native -mtune=native");\n        }\n@' "$BUILD_RS"

          echo "Patched file: $BUILD_RS"
          if ! grep -q 'CARGO_CFG_TARGET_OS' "$BUILD_RS"; then
            echo "Patch did not apply as expected."
            exit 1
          fi
          grep -n "CARGO_CFG_TARGET_OS\\|disable-asm\\|march=native" "$BUILD_RS"

      - name: Clear cached ffmpeg-sys-next build artifacts
        shell: bash
        run: |
          rm -rf src-tauri/target/aarch64-apple-darwin/release/build/ffmpeg-sys-next-*
          rm -rf src-tauri/target/aarch64-apple-darwin/debug/build/ffmpeg-sys-next-*
          rm -rf src-tauri/target/release/build/ffmpeg-sys-next-*
          rm -rf src-tauri/target/debug/build/ffmpeg-sys-next-*

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: src-vite

      - name: Download AI Models
        shell: bash
        run: bash scripts/download_models.sh

      - name: Build and Sign
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          args: --target aarch64-apple-darwin --verbose --bundles app,dmg --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Verify ffmpeg configure flags
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_MAK=$(find src-tauri/target -type f -path "*/ffmpeg-sys-next-*/out/ffmpeg-*/ffbuild/config.mak" | head -n 1)
          if [ -z "${CONFIG_MAK}" ]; then
            echo "Could not find ffmpeg config.mak"
            exit 1
          fi

          echo "Using ffmpeg config: $CONFIG_MAK"
          grep -n "FFMPEG_CONFIGURATION" "$CONFIG_MAK"

          if ! grep -q -- "--disable-asm" "$CONFIG_MAK"; then
            echo "Expected --disable-asm was not found in ffmpeg configuration."
            exit 1
          fi

          if grep -q -- "-march=native" "$CONFIG_MAK"; then
            echo "Unexpected -march=native found in ffmpeg configuration."
            exit 1
          fi

      - name: Notarize and Staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "Finding DMG for notarization..."
          DMG_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          fi
          if [ -z "$DMG_PATH" ]; then
            echo "Error: Could not find generated DMG file."
            exit 1
          fi

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

          export TAURI_KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"
          npx -y @tauri-apps/cli signer sign "$DMG_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lap-pr-macos-aarch64-${{ github.event.pull_request.number || github.run_number }}
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
